name: Performance

on:
  push:
    branches: [ main, d3ab-create-github-pi ]
  pull_request:
    branches: [ main ]

jobs:
  performance:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run linter (pylint)
      run: |
        uv run pylint projector/ || true

    - name: Run type checking (mypy)
      run: |
        uv run mypy projector/ || true

    - name: Run formatter check (ruff)
      run: |
        uv run ruff check projector/

    - name: Run tests with coverage (pytest)
      run: |
        uv run pytest tests/ -v --cov=projector --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
